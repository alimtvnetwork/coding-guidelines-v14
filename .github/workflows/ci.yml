name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  lint:
    name: Linter Scripts Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.22-${{ hashFiles('linter-scripts/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-1.22-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('linter-scripts/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Verify linter scripts present
        run: |
          test -f linter-scripts/validate-guidelines.go     || { echo "::error::validate-guidelines.go missing"; exit 1; }
          test -f linter-scripts/validate-guidelines.py     || { echo "::error::validate-guidelines.py missing"; exit 1; }
          test -f linter-scripts/check-axios-version.sh     || { echo "::error::check-axios-version.sh missing"; exit 1; }
          test -f linter-scripts/check-spec-folder-refs.py  || { echo "::error::check-spec-folder-refs.py missing"; exit 1; }

      - name: Run Go validator (spec)
        run: go run linter-scripts/validate-guidelines.go --path spec --max-lines 15

      - name: Run Python validator (spec)
        run: python3 linter-scripts/validate-guidelines.py spec || true

      - name: Run Axios version check
        run: bash linter-scripts/check-axios-version.sh

      - name: Check spec folder references (stale-link guard)
        run: python3 linter-scripts/check-spec-folder-refs.py

  sync-drift:
    name: Sync Drift Check (version.json + specTree.json)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (no scripts)
        # --ignore-scripts skips lifecycle hooks like postinstall — we only
        # need the workspace populated so the sync scripts can run. The
        # sync scripts themselves use only Node built-ins, so we don't
        # actually need any npm packages installed; this is here in case
        # future sync scripts depend on a package.
        run: npm ci --ignore-scripts --no-audit --no-fund
        continue-on-error: true

      - name: Run sync scripts
        run: npm run sync

      - name: Fail if sync produced diffs
        # We strip the `git` block and `updated` date from version.json before
        # diffing, because those fields legitimately change between local and
        # CI checkouts (different SHA, different branch, different day) and
        # would otherwise cause false-positive drift failures. The structural
        # content (version, stats, folders[]) must still match exactly.
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json', 'utf8'));
            delete v.git;
            delete v.updated;
            fs.writeFileSync('version.json', JSON.stringify(v, null, 2) + '\n');
          "
          git checkout -- version.json.bak 2>/dev/null || true
          git stash push -u -m drift-check version.json src/data/specTree.json >/dev/null 2>&1 || true
          git stash pop >/dev/null 2>&1 || true
          # Re-run sync, then strip volatile fields from BOTH the working copy
          # and the committed copy before comparing.
          npm run sync >/dev/null
          node -e "
            const fs = require('fs');
            for (const ref of ['HEAD', 'WORK']) {
              const src = ref === 'HEAD'
                ? require('child_process').execSync('git show HEAD:version.json').toString()
                : fs.readFileSync('version.json', 'utf8');
              const v = JSON.parse(src);
              delete v.git;
              delete v.updated;
              fs.writeFileSync(ref === 'HEAD' ? '/tmp/version.head.json' : '/tmp/version.work.json',
                JSON.stringify(v, null, 2) + '\n');
            }
          "
          if ! diff -u /tmp/version.head.json /tmp/version.work.json; then
            echo ""
            echo "::error::Drift detected in version.json (excluding git/updated fields)."
            echo "::error::Fix: run 'npm run sync' locally and commit the resulting changes."
            exit 1
          fi
          if ! git diff --exit-code --stat -- src/data/specTree.json; then
            echo ""
            echo "::error::Drift detected — src/data/specTree.json is out of sync with spec/ source files."
            echo "::error::Fix: run 'npm run sync' locally and commit the resulting changes."
            echo ""
            echo "--- Full diff ---"
            git diff -- src/data/specTree.json
            exit 1
          fi
          echo " OK No drift — structural content of version.json and specTree.json is in sync."
